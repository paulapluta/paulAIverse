<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bio-RAGsearch — ploota</title>
  <meta name="description" content="A personal experiment in RAG, agent, and MCP. Built with Claude Code.">

  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #f5f4f0;
      --text:   #1e1c17;
      --muted:  #726f68;
      --faint:  #b8b5af;
      --border: #d8d5ce;
      --grad-a: #4c3fd4;
      --grad-b: #a855f7;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Satoshi', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .g {
      background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Nav ── */
    nav {
      flex-shrink: 0;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .back-link {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    .nav-title {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    /* ── Iframe wrapper ── */
    .embed-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      ploota
    </a>
    <span class="nav-title">bio-<span class="g">RAG</span>search</span>
  </nav>

  <div class="embed-wrapper">
    <iframe
      src="https://bio-ragsearch-production.up.railway.app/"
      title="bio-RAGsearch — a personal experiment in RAG, agent, and MCP"
      loading="lazy"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
